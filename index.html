<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Dashboard</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="d-flex" id="wrapper">

    <!-- Sidebar -->
    <div class="bg-dark text-white" id="sidebar">
        <div class="sidebar-heading text-center py-4 fs-4 fw-bold border-bottom">
            Admin Panel
        </div>
        <div class="list-group list-group-flush">
            <a href="#" class="list-group-item list-group-item-action bg-dark text-white">Dashboard</a>
            <a href="#" class="list-group-item list-group-item-action bg-dark text-white">Orders</a>
            <a href="#" class="list-group-item list-group-item-action bg-dark text-white">Products</a>
            <a href="#" class="list-group-item list-group-item-action bg-dark text-white">Customers</a>
            <a href="#" class="list-group-item list-group-item-action bg-dark text-white">Reports</a>
            <a href="#" class="list-group-item list-group-item-action bg-dark text-white">Settings</a>
        </div>
    </div>

    <!-- Page Content -->
    <div id="page-content-wrapper">

        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom px-3">
            <button class="btn btn-primary" id="menu-toggle">☰</button>
            <h4 class="ms-3 mb-0">Dashboard</h4>
        </nav>

        <!-- Content -->
        <div class="container-fluid mt-4">

            <div class="row g-4">

                <!-- Card 1 -->
                <div class="col-md-3">
                    <div class="card text-white bg-primary shadow">
                        <div class="card-body">
                            <h5>Total Users</h5>
                            <h2>1,250</h2>
                        </div>
                    </div>
                </div>

                <!-- Card 2 -->
                <div class="col-md-3">
                    <div class="card text-white bg-success shadow">
                        <div class="card-body">
                            <h5>Orders</h5>
                            <h2>320</h2>
                        </div>
                    </div>
                </div>

                <!-- Card 3 -->
                <div class="col-md-3">
                    <div class="card text-white bg-warning shadow">
                        <div class="card-body">
                            <h5>Revenue</h5>
                            <h2>₹45,000</h2>
                        </div>
                    </div>
                </div>

                <!-- Card 4 -->
                <div class="col-md-3">
                    <div class="card text-white bg-danger shadow">
                        <div class="card-body">
                            <h5>Pending</h5>
                            <h2>25</h2>
                        </div>
                    </div>
                </div>

            </div>

            <!-- Table Section -->
            <div class="card mt-5 shadow">
                <div class="card-header bg-dark text-white">
                    Recent Orders
                </div>
                <div class="card-body">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Customer</th>
                                <th>Product</th>
                                <th>Status</th>
                                <th>Amount</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>1</td>
                                <td>Arjun</td>
                                <td>Laptop</td>
                                <td><span class="badge bg-success">Completed</span></td>
                                <td>₹50,000</td>
                            </tr>
                            <tr>
                                <td>2</td>
                                <td>Rahul</td>
                                <td>Phone</td>
                                <td><span class="badge bg-warning">Pending</span></td>
                                <td>₹20,000</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Toggle Script -->
<script>
    document.getElementById("menu-toggle").addEventListener("click", function () {
        document.getElementById("wrapper").classList.toggle("toggled");
    });
</script>

</body>
</html>
